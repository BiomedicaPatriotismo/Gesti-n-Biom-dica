  <title>Acceso a documentos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Segoe UI, sans-serif;
      background: #f3f2f1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      text-align: center;
    }
    .logo { font-size: 2rem; margin-bottom: 1rem; }
    h2 { color: #0078d4; font-size: 1.3rem; margin-bottom: 0.5rem; }
    .subtitulo { color: #605e5c; font-size: 14px; margin-bottom: 1.5rem; }
    label { display: block; text-align: left; font-size: 13px;
            color: #323130; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px; font-size: 16px;
      border: 1.5px solid #ccc; border-radius: 4px;
      margin-bottom: 1rem; text-transform: uppercase;
      letter-spacing: 2px;
    }
    input:focus { outline: none; border-color: #0078d4; }

    /* Botón principal - Acceder */
    .btn-primary {
      width: 100%; padding: 11px; background: #0078d4;
      color: white; border: none; border-radius: 4px;
      font-size: 15px; cursor: pointer; font-weight: 500;
      margin-bottom: 0.5rem;
    }
    .btn-primary:hover { background: #106ebe; }
    .btn-primary:active { background: #005a9e; }

    /* Divisor */
    .divisor {
      display: flex; align-items: center; gap: 10px;
      margin: 1.2rem 0;
      color: #a19f9d; font-size: 12px;
    }
    .divisor::before, .divisor::after {
      content: ""; flex: 1;
      height: 1px; background: #edebe9;
    }

    /* Botones secundarios */
    .btn-secundario {
      width: 100%; padding: 11px 14px;
      border-radius: 4px; font-size: 14px;
      cursor: pointer; font-weight: 500;
      display: flex; align-items: center;
      gap: 10px; margin-bottom: 0.6rem;
      border: 1.5px solid;
      background: white;
      transition: background 0.15s;
    }
    .btn-secundario .icono {
      font-size: 1.2rem; flex-shrink: 0;
    }
    .btn-secundario .texto {
      display: flex; flex-direction: column;
      text-align: left; line-height: 1.3;
    }
    .btn-secundario .texto span {
      font-size: 11px; font-weight: 400;
    }

    /* Botón reportar falla - rojo */
    .btn-falla {
      color: #d13438;
      border-color: #f4b8b8;
    }
    .btn-falla:hover { background: #fde7e9; }
    .btn-falla .texto span { color: #a4262c; }

    /* Botón manuales - verde */
    .btn-manuales {
      color: #107c10;
      border-color: #a9d3a9;
    }
    .btn-manuales:hover { background: #e7f3e7; }
    .btn-manuales .texto span { color: #0b6a0b; }

    .error {
      margin-top: 0.8rem; color: #d13438;
      font-size: 13px; display: none;
      background: #fde7e9; padding: 8px 12px;
      border-radius: 4px;
    }
    .footer { margin-top: 1.5rem; font-size: 12px; color: #a19f9d; }
  </style>
</head>

  function acceder() {
    const ref = document.getElementById("control").value.trim().toUpperCase();
    const error = document.getElementById("error");

    if (!ref) {
      error.textContent = "⚠️ Por favor ingresa un número de control valido.";
      error.style.display = "block";
      return;
    }

    const url = referencias[ref];
    if (url) {
      error.style.display = "none";
      window.location.href = url;
    } else {
      error.textContent = "⚠️ Referencia no encontrada. Verifica e intenta de nuevo.";
      error.style.display = "block";
    }
  }

  document.getElementById("control").addEventListener("keypress", function(e) {
    if (e.key === "Enter") acceder();
  });
